backend:
  name: github
  repo: a-xuan-creater/my-blog
  branch: main
  base_url: https://api.github.com
  auth_endpoint: /api/auth

media_folder: "public/images/posts"
public_folder: "/images/posts"

collections:
  - name: "posts"
    label: "博客文章"
    label_singular: "博客文章"
    folder: "content/posts"
    create: true
    slug: "{{slug}}"
    preview_path: "/posts/{{slug}}"
    identifier_field: title
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "描述", name: "description", widget: "text", required: false }
      - label: "发布日期"
        name: "date"
        widget: "datetime"
        date_format: "YYYY-MM-DD"
        time_format: false
        format: "YYYY-MM-DD"
      - { label: "标签", name: "tags", widget: "list", default: [], required: false }
      - { label: "草稿", name: "draft", widget: "boolean", default: false, required: false }
      - { label: "正文", name: "body", widget: "markdown" }
